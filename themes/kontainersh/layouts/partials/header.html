<header>
    <div class="container header-inner">
        <a href="{{ "/" | relURL }}" class="logo">
            <img src="{{ "images/logo-negativ.png" | relURL }}" alt="KONTAINER.SH">
        </a>
        {{ if not (eq .Type "legal") }}
        <button class="burger" onclick="this.classList.toggle('open');document.querySelector('nav').classList.toggle('open')" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <nav role="navigation" aria-label="Hauptnavigation">
            <a href="{{ "/" | relURL }}#leistungen">Leistungen</a>
            <a href="{{ "/" | relURL }}#vorgehen">Vorgehen</a>
            <a href="{{ "/" | relURL }}#beispiel-report">Beispiel-Report</a>
            <a href="{{ "/" | relURL }}#ueber-mich">Über mich</a>
            {{/* <a href="{{ "blog/" | relURL }}">Blog</a> – deaktiviert bis Blog-Sektion existiert */}}
            <a href="{{ "/" | relURL }}#kontakt" class="btn-nav-cta">Code Health Check anfragen</a>
        </nav>
        {{ else }}
        <a href="{{ "/" | relURL }}" class="back-link">&larr; Zurück zur Startseite</a>
        {{ end }}
    </div>
</header>
