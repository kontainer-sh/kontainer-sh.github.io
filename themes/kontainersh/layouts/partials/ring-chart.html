{{ $labels := .Site.Data.homepage.ring_labels }}
{{ $positions := slice "rl-top-right" "rl-bottom-right" "rl-bottom-left" "rl-top-left" }}
<div class="ring-chart">
    <svg aria-hidden="true" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="96" fill="none" stroke="#3D4556" stroke-width="1"/>
        <circle cx="100" cy="100" r="96" fill="none" stroke="#4A5268" stroke-width="2" stroke-dasharray="2 10.1" stroke-dashoffset="0"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#3D4556" stroke-width="20"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#54FFE3" stroke-width="20" stroke-dasharray="168 335" stroke-dashoffset="0" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#2DD4BF" stroke-width="20" stroke-dasharray="118 385" stroke-dashoffset="-176" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#F59E0B" stroke-width="20" stroke-dasharray="92 411" stroke-dashoffset="-302" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#8B5CF6" stroke-width="20" stroke-dasharray="67 436" stroke-dashoffset="-402" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="64" fill="none" stroke="#3D4556" stroke-width="1"/>
        <circle cx="100" cy="20" r="3" fill="#2B3040" stroke="#4A5268" stroke-width="1"/>
        <circle cx="66" cy="168" r="3" fill="#2B3040" stroke="#4A5268" stroke-width="1"/>
        <circle cx="170" cy="130" r="3" fill="#2B3040" stroke="#4A5268" stroke-width="1"/>
        <circle cx="165" cy="48" r="3" fill="#2B3040" stroke="#4A5268" stroke-width="1"/>
    </svg>
    <div class="ring-chart-center">
        <div class="label">AI</div>
        <div class="title">Project<br>Intelligence</div>
    </div>
    <div class="ring-chart-labels">
        {{ range $i, $l := $labels }}
        <span class="ring-label {{ index $positions $i }}">
            <span class="ring-label-step">{{ $l.step }}</span>
            <span class="ring-label-desc">{{ $l.desc }}</span>
        </span>
        {{ end }}
    </div>
</div>
